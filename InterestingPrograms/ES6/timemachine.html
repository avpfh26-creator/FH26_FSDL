<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Time Machine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .time-machine {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 2rem;
            width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid #00ff00;
        }
        
        h1 {
            color: #00ff00;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .display {
            background: #000;
            color: #0f0;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.2rem;
            margin: 1rem 0;
            font-family: monospace;
        }
        
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        
        .activity {
            margin-top: 1rem;
            padding: 1rem;
            background: #111;
            border-radius: 10px;
        }
        
        .task {
            color: #ff0;
            font-size: 0.9rem;
        }
        
        input {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
    </style>
</head>

</body>
</html>
