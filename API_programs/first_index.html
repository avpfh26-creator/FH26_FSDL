<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Learning - Step by Step</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .container {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
        .data-display {
            background-color: white;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            border: 1px solid #ddd;
        }
        .post-item {
            border-bottom: 1px solid #eee;
            padding: 10px;
        }
        .post-item h3 {
            margin: 5px 0;
            color: #333;
        }
        .post-item p {
            margin: 5px 0;
            color: #666;
        }
        .error {
            color: red;
            padding: 10px;
            background-color: #ffeeee;
            border-radius: 4px;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Learning API Programming in JavaScript</h1>
    
    <!-- Step 1: Basic API Call -->
    <div class="container">
        <h2>Step 1: Basic GET Request</h2>
        <button onclick="getBasicData()">Fetch Single Post</button>
        <div id="basicData" class="data-display">
            Click the button to fetch data...
        </div>
    </div>

    <!-- Step 2: Fetch Multiple Items -->
    <div class="container">
        <h2>Step 2: Fetch Multiple Posts</h2>
        <button onclick="getMultiplePosts()">Fetch All Posts</button>
        <div id="multiplePosts" class="data-display">
            Click the button to fetch posts...
        </div>
    </div>

    <!-- Step 3: POST Data -->
    <div class="container">
        <h2>Step 3: POST Data to API</h2>
        <input type="text" id="postTitle" placeholder="Enter title" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        <textarea id="postBody" placeholder="Enter content" rows="3" style="width: 100%; padding: 8px; margin-bottom: 10px;"></textarea>
        <button onclick="createPost()">Create New Post</button>
        <div id="postResult" class="data-display">
            Fill the form and click create...
        </div>
    </div>

    <!-- Step 4: Advanced with Loading States -->
    <div class="container">
        <h2>Step 4: Advanced - With Loading States</h2>
        <button onclick="getPostsWithLoading()">Fetch Posts (with loading)</button>
        <div id="loadingData" class="data-display">
            Ready to fetch...
        </div>
    </div>

    <script src="api-learning.js"></script>
</body>
</html>
